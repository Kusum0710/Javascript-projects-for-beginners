<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Iosevka+Charon:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1>Expense Tracker</h1>
       
    <div class="Balance-container">
        <h4>Your Balance</h4>
        <br>
        <h1 id="balance">₹0.00</h1>

        <div class="summary">
            <div class="income">
                <h4>Income</h4>
                <div id="income" style="color:#059669">₹0.00</div>
            </div>
            <div class="expense">
                <h4>Expense</h4>
                <div id="expense" style="color: rgb(239, 68, 68);">₹0.00</div>
            </div>
        </div>
    </div>
    <div class="main-container">
        <div class="transaction-history">
            <h3>Transaction History</h3>
            <ul id="transaction-list">
                <!-- Transactions will be added here -->

            </ul>
        </div>
        <div class="form-container">
                <h2>Add New Transaction</h2>
                <form id="transaction-form">
                    <div class="form-control">
                        <label for="description">Text</label>
                        <input type="text" id="description" placeholder="Enter text..." required>
                    </div>
                    <div class="form-control">
                        <label for="amount">Amount</label>
                        <input type="number" id="amount" placeholder="Enter amount..." required>
                        <small>(negative - expense, positive - income)</small>
                    </div>
                    <button type="submit" class="btn">Add Transaction</button>
                </form>
        </div>
    </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
